        turn_on:
          service: media_player.volume_mute
          target:
            entity_id: media_player.living_room_sony_avr
          data:
            is_volume_muted: false
        turn_off:
          service: media_player.volume_mute
          target:
            entity_id: media_player.living_room_sony_avr
          data:
            is_volume_muted: true
        set_level:
          service: media_player.volume_set
          target:
            entity_id: media_player.living_room_sony_avr
          data:
            volume_level: "{{ (brightness / 255 * 100)|int / 100 }}"
